name: Multi-Stage Workflow

on:
  push:
    branches: [ main, master ]  # Runs on pushes to main/master branch
  workflow_dispatch:  # Allows manual triggering

jobs:
  hello-world-job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: First Message
      run: echo "hello world"
  
  how-are-you-job:
    runs-on: ubuntu-latest
    needs: hello-world-job  # This ensures it runs after the first job
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Second Message
      run: echo "how are you"
